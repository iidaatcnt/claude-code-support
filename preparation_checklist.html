<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code インストール 事前準備</title>
  <style>
    :root {
      --bg: #0a0e27;
      --surface: #141830;
      --surface2: #1e2340;
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #4caf50;
      --warning: #ff6b6b;
      --text: #ffffff;
      --subtext: #a0a0c0;
      --border: #2a2f52;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }

    .header-logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-subtitle {
      color: var(--subtext);
      font-size: 13px;
      margin-top: 2px;
    }

    /* OS Selection */
    .os-selection {
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .os-selection h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .os-selection p {
      color: var(--subtext);
      font-size: 14px;
      margin-bottom: 36px;
    }

    .os-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .os-btn {
      flex: 1;
      max-width: 200px;
      padding: 28px 16px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .os-btn:hover {
      border-color: var(--primary);
      background: rgba(102, 126, 234, 0.1);
    }

    .os-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
    }

    /* Checklist Container */
    .checklist-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
      display: none;
    }

    .checklist-container.visible {
      display: block;
    }

    /* OS Tag */
    .os-change {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .os-tag {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }

    .change-os-btn {
      background: none;
      border: none;
      color: var(--subtext);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }

    .change-os-btn:hover { color: var(--text); }

    /* Progress */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label { font-size: 14px; color: var(--subtext); }

    .progress-count {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .progress-bar-bg {
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(102, 126, 234, 0.1);
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    /* Section Label */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 10px 4px;
    }

    /* Checklist Item */
    .checklist-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .checklist-item.checked {
      border-color: rgba(76, 175, 80, 0.5);
      opacity: 0.7;
    }

    .item-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .item-header:hover { background: rgba(255,255,255,0.02); }

    /* Checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 700;
    }

    .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    /* Badge */
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .badge-required {
      background: rgba(255, 107, 107, 0.15);
      color: var(--warning);
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    /* Item Title */
    .item-title {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
    }

    .item-title.done {
      text-decoration: line-through;
      color: var(--subtext);
    }

    /* Expand Arrow */
    .expand-arrow {
      color: var(--subtext);
      font-size: 11px;
      transition: transform 0.2s;
    }

    .expand-arrow.open { transform: rotate(180deg); }

    /* Item Content */
    .item-content {
      display: none;
      padding: 12px 16px 16px 50px;
      border-top: 1px solid var(--border);
    }

    .item-content.open { display: block; }

    .item-description {
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .content-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .content-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .content-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      background: rgba(102, 126, 234, 0.08);
      border-radius: 8px;
      transition: background 0.2s;
    }

    .content-link:hover { background: rgba(102, 126, 234, 0.16); }

    /* Select */
    .select-wrap { margin-top: 4px; }

    .select-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      appearance: none;
    }

    .select-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Completion Banner */
    .completion-banner {
      display: none;
      background: linear-gradient(135deg, rgba(76,175,80,0.15), rgba(102,126,234,0.15));
      border: 1px solid var(--success);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      margin-top: 24px;
    }

    .completion-banner.visible { display: block; }

    .completion-banner h3 { font-size: 20px; margin-bottom: 8px; }

    .completion-banner p {
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.6;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .modal h3 { font-size: 18px; margin-bottom: 10px; }

    .modal p {
      color: var(--subtext);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-buttons { display: flex; gap: 12px; }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .btn-reset {
      flex: 1;
      padding: 12px;
      background: var(--warning);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">Claude Code</div>
  <div class="header-subtitle">インストール 事前準備チェックリスト</div>
</div>

<!-- OS Selection -->
<div class="os-selection" id="osSelection">
  <h2>あなたのPCはどちらですか？</h2>
  <p>OSによって事前準備の内容が一部異なります</p>
  <div class="os-buttons">
    <button class="os-btn" onclick="selectOS('mac')">
      <span class="os-icon"></span>Mac
    </button>
    <button class="os-btn" onclick="selectOS('win')">
      <span class="os-icon">🪟</span>Windows
    </button>
  </div>
</div>

<!-- Checklist -->
<div class="checklist-container" id="checklistContainer">

  <div class="os-change">
    <span class="os-tag" id="osTag"></span>
    <button class="change-os-btn" onclick="showOSSelection()">OSを変更する</button>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">事前準備の進捗</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">未完了のみ表示</button>
    <button class="reset-btn" onclick="showResetModal()">最初からやり直す</button>
  </div>

  <div class="section-label">共通（全員）</div>
  <div id="commonItems"></div>

  <div class="section-label" id="osLabel"></div>
  <div id="osItems"></div>

  <div class="completion-banner" id="completionBanner">
    <h3>🎉 準備完了！</h3>
    <p>全ての事前確認が完了しました。<br>当日は会場でお会いしましょう！</p>
  </div>

</div>

<!-- Reset Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>最初からやり直しますか？</h3>
    <p>OS選択とチェックリストの進捗が全てリセットされます。<br>アカウント情報は削除されません。</p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="hideResetModal()">キャンセル</button>
      <button class="btn-reset" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<script>
  const commonItems = [
    {
      id: 'wifi',
      title: 'WiFiの確認',
      description: 'インストールやアップデートには安定したWiFiが必要です。\n"google speed test" で検索してスピードテストを試してみましょう。',
      links: [{ icon: '🔗', label: 'Google Speed Test を開く', url: 'https://www.google.com/search?q=google+speed+test' }]
    },
    {
      id: 'power',
      title: '電源ケーブルの用意',
      description: 'OSのアップデート中はバッテリー切れを防ぐため電源ケーブルが必要です。\n当日は必ず持参してください。',
      links: []
    },
    {
      id: 'sms',
      title: 'ショートメッセージ（SMS）の確認',
      description: 'Claude Code のログインにはSMS認証が必要です。\n事前に自分宛にSMSを送って受信できるか確認しておきましょう。',
      links: []
    },
    {
      id: 'credit_card',
      title: 'クレジットカードの用意',
      description: 'Claude Code は Pro プラン以上でないと使用できません。\n当日 Pro 登録ができるよう、クレジットカードを用意しておいてください。',
      links: []
    },
    {
      id: 'gmail',
      title: 'Googleアカウント（Gmail）の確認',
      description: 'このシステムへのログインに Google アカウントを使います。\nログインできるか事前に確認しておきましょう。',
      links: []
    },
    {
      id: 'name_badge',
      title: '名札の用意',
      description: '会場（新橋オフィス）では名札の着用が義務です。\n当日は名札を持参するか、会場で受け取ってください。',
      links: []
    },
    {
      id: 'claude_account',
      title: 'Claudeのアカウント確認',
      description: 'Claude のアカウントをすでに持っていますか？',
      links: [],
      type: 'select',
      selectId: 'select_claude_account',
      options: ['選択してください', 'アカウントなし', 'アカウントあり']
    },
    {
      id: 'claude_plan',
      title: 'Claudeの契約プラン確認',
      description: '現在契約している Claude のプランを選択してください。\nプランによって当日の開始ステップが変わります。',
      links: [],
      type: 'select',
      selectId: 'select_claude_plan',
      options: ['選択してください', 'なし（契約していない）', 'フリープラン', 'Pro', 'Max x5', 'Max x20', 'それ以上']
    }
  ];

  const macItems = [
    {
      id: 'macos_update',
      title: 'macOS Tahoe（26.4）へアップデート',
      description: 'Claude Code は最新の macOS が必要です。\nアップデートには時間がかかるので当日ではなく事前に済ませておきましょう。\n\n確認場所：システム設定 → 一般 → ソフトウェアアップデート',
      links: []
    },
    {
      id: 'mac_screenshot',
      title: 'スクショの撮り方（Mac）',
      description: 'ほしい画面だけ切り取る方法と、保存場所を確認しておきましょう。\n\n全画面：⌘ + Shift + 3\n範囲選択：⌘ + Shift + 4\n保存先：デスクトップ',
      links: []
    }
  ];

  const winItems = [
    {
      id: 'win_type',
      title: 'WindowsのCPU種類を確認（Intel / ARM）',
      description: 'Claude Code のインストーラーは CPU の種類によって異なります。\n自分の PC が Intel か ARM かを確認して、AIにどのバージョンをインストールすべきか聞いておきましょう。',
      links: []
    },
    {
      id: 'win_screenshot',
      title: 'スクショの撮り方（Windows）',
      description: 'ほしい画面だけ切り取る方法と、保存場所を確認しておきましょう。\n\n全画面：Windows + PrtSc\n範囲選択：Windows + Shift + S\n保存先：ピクチャ → スクリーンショット',
      links: []
    }
  ];

  // State
  let currentOS = localStorage.getItem('os') || null;
  let checked = JSON.parse(localStorage.getItem('checked') || '{}');
  let filterIncomplete = false;

  function init() {
    if (currentOS) {
      showChecklist();
    }
  }

  function selectOS(os) {
    currentOS = os;
    localStorage.setItem('os', os);
    showChecklist();
  }

  function showOSSelection() {
    document.getElementById('osSelection').style.display = 'block';
    document.getElementById('checklistContainer').classList.remove('visible');
  }

  function showChecklist() {
    document.getElementById('osSelection').style.display = 'none';
    document.getElementById('checklistContainer').classList.add('visible');
    document.getElementById('osTag').textContent = currentOS === 'mac' ? ' Mac' : '🪟 Windows';
    document.getElementById('osLabel').textContent = currentOS === 'mac' ? 'Mac 専用' : 'Windows 専用';
    renderAll();
    updateProgress();
  }

  function renderAll() {
    renderSection('commonItems', commonItems);
    renderSection('osItems', currentOS === 'mac' ? macItems : winItems);
  }

  function renderSection(containerId, items) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    items.forEach(item => {
      if (filterIncomplete && checked[item.id]) return;
      el.appendChild(buildItem(item));
    });
  }

  function buildItem(item) {
    const isChecked = !!checked[item.id];
    const div = document.createElement('div');
    div.className = 'checklist-item' + (isChecked ? ' checked' : '');
    div.id = 'item-' + item.id;

    const hasContent = item.description || (item.links && item.links.length) || item.type === 'select';

    let contentHTML = '';
    if (hasContent) {
      let inner = '';
      if (item.description) {
        inner += `<p class="item-description">${item.description}</p>`;
      }
      if (item.type === 'select') {
        const savedVal = checked[item.id + '_val'] || '';
        inner += `<div class="select-wrap">
          <select class="select-input" onchange="onSelect('${item.id}', this.value)">
            ${item.options.map(o => `<option value="${o}"${savedVal === o ? ' selected' : ''}>${o}</option>`).join('')}
          </select>
        </div>`;
      }
      if (item.links && item.links.length) {
        inner += `<div class="content-label">参考コンテンツ</div><div class="content-links">`;
        item.links.forEach(l => {
          inner += `<a class="content-link" href="${l.url}" target="_blank"><span>${l.icon}</span>${l.label}</a>`;
        });
        inner += `</div>`;
      }
      contentHTML = `<div class="item-content" id="content-${item.id}">${inner}</div>`;
    }

    div.innerHTML = `
      <div class="item-header" onclick="toggleExpand('${item.id}')">
        <div class="checkbox${isChecked ? ' checked' : ''}" onclick="toggleCheck(event,'${item.id}')">${isChecked ? '✓' : ''}</div>
        <span class="badge badge-required">必須</span>
        <span class="item-title${isChecked ? ' done' : ''}">${item.title}</span>
        ${hasContent ? `<span class="expand-arrow" id="arrow-${item.id}">▼</span>` : ''}
      </div>
      ${contentHTML}
    `;
    return div;
  }

  function toggleExpand(id) {
    const content = document.getElementById('content-' + id);
    const arrow = document.getElementById('arrow-' + id);
    if (content) content.classList.toggle('open');
    if (arrow) arrow.classList.toggle('open');
  }

  function toggleCheck(e, id) {
    e.stopPropagation();
    if (checked[id]) {
      delete checked[id];
    } else {
      checked[id] = true;
    }
    save();
    renderAll();
    updateProgress();
  }

  function onSelect(id, value) {
    if (value !== '選択してください') {
      checked[id] = true;
      checked[id + '_val'] = value;
    } else {
      delete checked[id];
      delete checked[id + '_val'];
    }
    save();
    updateProgress();
    // チェックボックスとタイトルだけ更新（ドロップダウンを閉じないため）
    const itemEl = document.getElementById('item-' + id);
    if (itemEl) {
      const isNowChecked = !!checked[id];
      itemEl.className = 'checklist-item' + (isNowChecked ? ' checked' : '');
      const cb = itemEl.querySelector('.checkbox');
      if (cb) { cb.className = 'checkbox' + (isNowChecked ? ' checked' : ''); cb.textContent = isNowChecked ? '✓' : ''; }
      const t = itemEl.querySelector('.item-title');
      if (t) t.className = 'item-title' + (isNowChecked ? ' done' : '');
    }
  }

  function updateProgress() {
    const osSpecific = currentOS === 'mac' ? macItems : winItems;
    const all = [...commonItems, ...osSpecific];
    const total = all.length;
    const done = all.filter(i => checked[i.id]).length;
    document.getElementById('progressCount').textContent = done + ' / ' + total;
    document.getElementById('progressBar').style.width = (total ? (done / total * 100) : 0) + '%';
    document.getElementById('completionBanner').classList.toggle('visible', total > 0 && done === total);
  }

  function toggleFilter() {
    filterIncomplete = !filterIncomplete;
    const btn = document.getElementById('filterBtn');
    btn.classList.toggle('active', filterIncomplete);
    btn.textContent = filterIncomplete ? '全て表示' : '未完了のみ表示';
    renderAll();
  }

  function save() {
    localStorage.setItem('checked', JSON.stringify(checked));
  }

  function showResetModal() {
    document.getElementById('resetModal').classList.add('visible');
  }

  function hideResetModal() {
    document.getElementById('resetModal').classList.remove('visible');
  }

  function resetAll() {
    checked = {};
    currentOS = null;
    localStorage.removeItem('checked');
    localStorage.removeItem('os');
    hideResetModal();
    document.getElementById('checklistContainer').classList.remove('visible');
    document.getElementById('osSelection').style.display = 'block';
  }

  init();
</script>
</body>
</html>
