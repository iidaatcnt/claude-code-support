<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ 管理画面 | Claude Code サポート</title>
  <style>
    :root {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #f8f8f5;
      --primary: #f5a623;
      --primary-dark: #e8941a;
      --danger: #e74c3c;
      --success: #27ae60;
      --text: #1a1a1a;
      --subtext: #888888;
      --border: #e8e8e4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--primary);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo { font-size: 18px; font-weight: 800; text-decoration: none; color: var(--text); }
    .header-logo span { color: var(--primary); }
    .header-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--danger);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .header-nav { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .header-nav a { color: var(--subtext); text-decoration: none; font-size: 13px; font-weight: 600; transition: color 0.2s; }
    .header-nav a:hover { color: var(--primary-dark); }
    .header-nav a.active { color: var(--primary-dark); border-bottom: 2px solid var(--primary); padding-bottom: 1px; }

    /* Auth */
    .login-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      color: var(--subtext);
      font-family: inherit;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Layout */
    .layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title { font-size: 14px; font-weight: 700; }

    .new-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-btn:hover { background: var(--primary-dark); }

    .article-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .article-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .article-item:hover { background: var(--bg); }
    .article-item.active { background: #fff3d6; border-color: var(--primary); }

    .article-item-series {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 4px;
    }
    .article-item-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }
    .article-item-date {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 4px;
    }

    /* Editor */
    .editor {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .editor-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--subtext);
      font-size: 15px;
      text-align: center;
    }

    /* Form elements */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .field-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--primary); }

    .field-title input {
      font-size: 18px;
      font-weight: 700;
    }

    .fields-row { display: flex; gap: 16px; }
    .fields-row .field { flex: 1; }

    select.field-input { cursor: pointer; appearance: none; }

    /* Tags input */
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      min-height: 44px;
      cursor: text;
    }
    .tags-wrap:focus-within { border-color: var(--primary); }
    .tag-item {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #fff3d6;
      border: 1px solid var(--primary);
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 13px;
      color: var(--primary-dark);
      font-weight: 600;
    }
    .tag-remove {
      cursor: pointer;
      font-size: 14px;
      color: var(--primary-dark);
      line-height: 1;
    }
    .tag-remove:hover { color: var(--danger); }
    .tags-input {
      border: none;
      outline: none;
      font-size: 13px;
      background: transparent;
      min-width: 80px;
      color: var(--text);
      font-family: inherit;
    }

    /* Blocks */
    .blocks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .blocks-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .add-block-btns { display: flex; gap: 8px; }
    .add-block-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }
    .add-block-btn:hover { border-color: var(--primary); color: var(--primary-dark); }

    .blocks-list { display: flex; flex-direction: column; gap: 10px; }

    .block-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .block-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .block-type-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--border);
      color: var(--subtext);
    }
    .block-type-badge.text { background: #e8f4fd; color: #2980b9; }
    .block-type-badge.image { background: #fde8f0; color: #c0392b; }
    .block-move-btns { display: flex; gap: 2px; margin-left: auto; }
    .block-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--subtext);
      transition: all 0.15s;
    }
    .block-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
    .block-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    .block-text-area {
      width: 100%;
      border: none;
      outline: none;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.8;
      color: var(--text);
      resize: vertical;
      min-height: 100px;
      background: var(--surface);
    }

    .block-image-area {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .image-preview {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: none;
    }
    .image-preview.visible { display: block; }
    .image-upload-btn {
      display: inline-block;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      color: var(--subtext);
      font-size: 13px;
      transition: all 0.2s;
    }
    .image-upload-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
    .image-file-input { display: none; }

    /* Paste area */
    .paste-area {
      border: 2px dashed var(--primary);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: text;
      background: #fffbf0;
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      min-height: 80px;
      outline: none;
      line-height: 1.7;
    }
    .paste-area:focus {
      border-color: var(--primary-dark);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    }
    .paste-area.dragging {
      background: #fff3d6;
      border-color: var(--primary-dark);
    }
    .paste-hint {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Save / Delete */
    .editor-actions {
      display: flex;
      gap: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .save-btn {
      flex: 1;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: var(--primary-dark); }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .delete-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--subtext);
      transition: all 0.2s;
    }
    .delete-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>

<div class="header">
  <a href="/" class="header-logo">Claude <span>Code</span> サポート</a>
  <span class="header-badge">管理画面</span>
  <nav class="header-nav">
    <a href="/">トップ</a>
    <a href="/faq">FAQ</a>
    <a href="/precheck">事前準備</a>
    <div id="authArea">
      <button class="login-btn" id="loginBtn">Googleでログイン</button>
    </div>
  </nav>
</div>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">記事一覧</span>
      <button class="new-btn" onclick="newArticle()">＋ 新規作成</button>
    </div>
    <div class="article-list" id="articleList">
      <div style="padding:20px;color:var(--subtext);font-size:13px;">読み込み中...</div>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor" id="editor">
    <div class="editor-placeholder">
      <div>
        <div style="font-size:40px;margin-bottom:12px;">📝</div>
        <div>左の一覧から記事を選ぶか<br>「＋ 新規作成」をクリックしてください</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDBG1tAKgcjBbht5YYxWdQssiWMlB7yRIc",
    authDomain: "claude-code-support.firebaseapp.com",
    projectId: "claude-code-support",
    storageBucket: "claude-code-support.firebasestorage.app",
    messagingSenderId: "819245008964",
    appId: "1:819245008964:web:ead21e5842189d1506d411"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // ── Auth（ヘッダー表示） ──────────────────────
  document.getElementById('loginBtn').addEventListener('click', () => {
    signInWithPopup(auth, new GoogleAuthProvider());
  });

  onAuthStateChanged(auth, (user) => {
    const authArea = document.getElementById('authArea');
    if (user) {
      authArea.innerHTML = `
        <div class="user-info">
          ${user.photoURL ? `<img class="user-avatar" src="${user.photoURL}">` : ''}
          <span class="user-name">${user.displayName || user.email}</span>
          <button class="logout-btn" id="logoutBtn">ログアウト</button>
        </div>`;
      document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    } else {
      authArea.innerHTML = `<button class="login-btn" id="loginBtn">Googleでログイン</button>`;
      document.getElementById('loginBtn').addEventListener('click', () => {
        signInWithPopup(auth, new GoogleAuthProvider());
      });
    }
  });

  const SERIES_OPTIONS = [
    'クロコのよくある質問',
    'クロコのインストールはまりどころ',
    'クロコのオフ会の参加コツ',
    'Claude codeのよくある質問',
    'その他',
  ];

  let allFaqs = [];
  let currentId = null;   // 編集中の記事ID（null = 新規）
  let blocks = [];        // 編集中のブロック配列
  let tags = [];          // 編集中のタグ配列

  // ── データ読み込み ──────────────────────────
  async function loadFAQs() {
    const q = query(collection(db, 'faq'), orderBy('updatedAt', 'desc'));
    const snap = await getDocs(q);
    allFaqs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
  }

  function renderList() {
    const el = document.getElementById('articleList');
    if (allFaqs.length === 0) {
      el.innerHTML = '<div style="padding:20px;color:var(--subtext);font-size:13px;">記事がまだありません</div>';
      return;
    }
    el.innerHTML = allFaqs.map(f => {
      const date = f.updatedAt ? new Date(f.updatedAt.seconds ? f.updatedAt.seconds * 1000 : f.updatedAt).toLocaleDateString('ja-JP') : '';
      return `
        <div class="article-item ${f.id === currentId ? 'active' : ''}" onclick="loadArticle('${f.id}')">
          <div class="article-item-series">${f.series || '未分類'}</div>
          <div class="article-item-title">${f.title || '（タイトルなし）'}</div>
          <div class="article-item-date">${date}</div>
        </div>`;
    }).join('');
  }

  // ── 記事を編集フォームに読み込む ──────────
  window.loadArticle = function(id) {
    const f = allFaqs.find(x => x.id === id);
    if (!f) return;
    currentId = id;
    blocks = JSON.parse(JSON.stringify(f.blocks || []));
    tags = [...(f.tags || [])];
    renderEditor(f);
    renderList();
  };

  window.newArticle = function() {
    currentId = null;
    blocks = [];
    tags = [];
    renderEditor({ title: '', series: SERIES_OPTIONS[0] });
    renderList();
  };

  // ── エディタ描画 ──────────────────────────
  function renderEditor(data = {}) {
    const seriesOptions = SERIES_OPTIONS.map(s =>
      `<option value="${s}" ${data.series === s ? 'selected' : ''}>${s}</option>`
    ).join('');

    document.getElementById('editor').innerHTML = `
      <div class="field field-title">
        <label class="field-label">タイトル</label>
        <input class="field-input" id="titleInput" type="text" placeholder="記事のタイトル" value="${data.title || ''}">
      </div>

      <div class="fields-row">
        <div class="field">
          <label class="field-label">シリーズ</label>
          <select class="field-input" id="seriesInput">${seriesOptions}</select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">タグ（Enterで追加）</label>
        <div class="tags-wrap" id="tagsWrap" onclick="document.getElementById('tagTextInput').focus()">
          <input class="tags-input" id="tagTextInput" type="text" placeholder="タグを入力...">
        </div>
      </div>

      <div>
        <div class="blocks-header">
          <span class="blocks-label">本文ブロック</span>
          <div class="add-block-btns">
            <button class="add-block-btn" onclick="addBlock('text')">＋ テキスト</button>
            <button class="add-block-btn" onclick="addBlock('image')">＋ 画像</button>
          </div>
        </div>

        <div style="margin-top:10px">
          <div class="paste-area" id="pasteArea" contenteditable="false" tabindex="0">
            📋 ここにテキスト＆画像をまとめて貼り付け
            <div class="paste-hint">Ctrl+V / ⌘+V でペースト。テキストと画像が自動でブロックに分かれます</div>
          </div>
        </div>

        <div style="margin-top:10px">
          <div class="blocks-list" id="blocksList"></div>
        </div>
      </div>

      <div class="editor-actions">
        <button class="save-btn" id="saveBtn" onclick="saveArticle()">保存する</button>
        ${currentId ? `<button class="delete-btn" onclick="deleteArticle()">削除</button>` : ''}
      </div>
    `;

    // タグ描画
    renderTags();

    // タグ入力イベント
    document.getElementById('tagTextInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = e.target.value.trim().replace(/,/g, '');
        if (val && !tags.includes(val)) {
          tags.push(val);
          renderTags();
        }
        e.target.value = '';
      }
    });

    renderBlocks();

    // ペーストエリアのイベント設定
    const pasteArea = document.getElementById('pasteArea');
    if (pasteArea) {
      pasteArea.addEventListener('paste', handlePaste);
      pasteArea.addEventListener('dragover', e => {
        e.preventDefault();
        pasteArea.classList.add('dragging');
      });
      pasteArea.addEventListener('dragleave', () => {
        pasteArea.classList.remove('dragging');
      });
      pasteArea.addEventListener('drop', e => {
        e.preventDefault();
        pasteArea.classList.remove('dragging');
        handleDroppedFiles(e.dataTransfer);
      });
    }
  }

  // ── ペースト処理 ──────────────────────────
  function handlePaste(e) {
    e.preventDefault();
    const clipboardData = e.clipboardData;
    if (!clipboardData) return;

    // HTML からテキストと画像を分離して処理
    const html = clipboardData.getData('text/html');
    const plainText = clipboardData.getData('text/plain');

    // クリップボードの画像ファイルを収集
    const imageFiles = [];
    for (let i = 0; i < clipboardData.items.length; i++) {
      const item = clipboardData.items[i];
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) imageFiles.push(file);
      }
    }

    // HTML が含まれる場合 → テキストと画像タグを解析して分割
    if (html) {
      parseHtmlToBlocks(html, imageFiles);
    } else if (imageFiles.length > 0) {
      // 画像のみペーストされた場合
      imageFiles.forEach(file => addImageBlockFromFile(file));
    } else if (plainText) {
      // テキストのみ
      addTextBlockFromContent(plainText);
    }

    renderBlocks();
    showToast('ペーストからブロックを追加しました', 'success');
  }

  function handleDroppedFiles(dataTransfer) {
    if (!dataTransfer || !dataTransfer.files) return;
    let added = false;
    for (let i = 0; i < dataTransfer.files.length; i++) {
      const file = dataTransfer.files[i];
      if (file.type.startsWith('image/')) {
        addImageBlockFromFile(file);
        added = true;
      }
    }
    if (added) {
      renderBlocks();
      showToast('画像ブロックを追加しました', 'success');
    }
  }

  function parseHtmlToBlocks(html, fallbackImageFiles) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const body = doc.body;

    // img src を収集（base64 や blob の場合に使う）
    const imgElements = body.querySelectorAll('img');
    let fallbackIndex = 0;

    // body の子ノードを順番にたどる
    const nodes = body.childNodes;
    let textBuffer = '';

    function flushText() {
      const trimmed = textBuffer.trim();
      if (trimmed) {
        addTextBlockFromContent(trimmed);
      }
      textBuffer = '';
    }

    function processNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent;
        if (text.trim()) textBuffer += text;
        return;
      }

      if (node.nodeType !== Node.ELEMENT_NODE) return;
      const el = node;
      const tag = el.tagName.toLowerCase();

      // img タグ → 画像ブロック
      if (tag === 'img') {
        flushText();
        const src = el.getAttribute('src');
        if (src && (src.startsWith('data:') || src.startsWith('blob:'))) {
          // インライン画像: data URI をそのまま使う
          addImageBlockFromDataUrl(src);
        } else if (src && src.startsWith('http')) {
          // 外部URL: テキストブロックにURLを追加（CORSのためアップロード不可）
          addTextBlockFromContent(`[画像] ${src}`);
        } else if (fallbackImageFiles[fallbackIndex]) {
          addImageBlockFromFile(fallbackImageFiles[fallbackIndex]);
          fallbackIndex++;
        }
        return;
      }

      // img を含む要素は再帰処理
      if (el.querySelector('img')) {
        flushText();
        el.childNodes.forEach(child => processNode(child));
        return;
      }

      // ブロック要素 → テキストを区切る
      const blockTags = ['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'li', 'br', 'hr', 'blockquote', 'pre', 'tr'];
      if (blockTags.includes(tag)) {
        const innerText = el.textContent.trim();
        if (innerText) {
          textBuffer += (textBuffer ? '\n' : '') + innerText;
        }
        return;
      }

      // インライン要素 → テキストに追加
      const innerText = el.textContent;
      if (innerText.trim()) textBuffer += innerText;
    }

    nodes.forEach(node => processNode(node));
    flushText();

    // fallback: HTML内にimgがなく、クリップボードに画像ファイルがある場合
    while (fallbackIndex < fallbackImageFiles.length) {
      addImageBlockFromFile(fallbackImageFiles[fallbackIndex]);
      fallbackIndex++;
    }
  }

  function addTextBlockFromContent(text) {
    blocks.push({ type: 'text', content: text });
  }

  function addImageBlockFromFile(file) {
    const block = { type: 'image', url: '', _file: file, _preview: '' };
    blocks.push(block);
    const idx = blocks.length - 1;
    const reader = new FileReader();
    reader.onload = e => {
      blocks[idx]._preview = e.target.result;
      const img = document.getElementById(`preview-${idx}`);
      if (img) { img.src = e.target.result; img.classList.add('visible'); }
    };
    reader.readAsDataURL(file);
  }

  function addImageBlockFromDataUrl(dataUrl) {
    // data URL → File オブジェクトに変換
    const arr = dataUrl.split(',');
    const mimeMatch = arr[0].match(/:(.*?);/);
    const mime = mimeMatch ? mimeMatch[1] : 'image/png';
    const ext = mime.split('/')[1] || 'png';
    try {
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) u8arr[n] = bstr.charCodeAt(n);
      const file = new File([u8arr], `pasted_${Date.now()}.${ext}`, { type: mime });
      addImageBlockFromFile(file);
    } catch {
      // data URL のデコードに失敗した場合はスキップ
      console.warn('画像のデコードに失敗しました');
    }
  }

  function renderTags() {
    const wrap = document.getElementById('tagsWrap');
    const input = document.getElementById('tagTextInput');
    wrap.innerHTML = '';
    tags.forEach((t, i) => {
      const span = document.createElement('span');
      span.className = 'tag-item';
      span.innerHTML = `#${t}<span class="tag-remove" onclick="removeTag(${i})">×</span>`;
      wrap.appendChild(span);
    });
    wrap.appendChild(input);
  }

  window.removeTag = function(i) {
    tags.splice(i, 1);
    renderTags();
  };

  // ── ブロック操作 ──────────────────────────
  function renderBlocks() {
    const list = document.getElementById('blocksList');
    if (!list) return;

    if (blocks.length === 0) {
      list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--subtext);font-size:13px;border:2px dashed var(--border);border-radius:10px">上のボタンでブロックを追加してください</div>`;
      return;
    }

    list.innerHTML = blocks.map((b, i) => {
      const isFirst = i === 0, isLast = i === blocks.length - 1;
      const moveUp = !isFirst ? `<button class="block-btn" onclick="moveBlock(${i},-1)">↑</button>` : '';
      const moveDown = !isLast ? `<button class="block-btn" onclick="moveBlock(${i},1)">↓</button>` : '';

      if (b.type === 'text') {
        return `
          <div class="block-item" id="block-${i}">
            <div class="block-controls">
              <span class="block-type-badge text">テキスト</span>
              <div class="block-move-btns">${moveUp}${moveDown}<button class="block-btn del" onclick="removeBlock(${i})">✕</button></div>
            </div>
            <textarea class="block-text-area" placeholder="テキストを入力..." oninput="updateBlockText(${i},this.value)">${b.content || ''}</textarea>
          </div>`;
      }

      if (b.type === 'image') {
        const previewSrc = b._preview || b.url || '';
        return `
          <div class="block-item" id="block-${i}">
            <div class="block-controls">
              <span class="block-type-badge image">画像</span>
              <div class="block-move-btns">${moveUp}${moveDown}<button class="block-btn del" onclick="removeBlock(${i})">✕</button></div>
            </div>
            <div class="block-image-area">
              <img class="image-preview ${previewSrc ? 'visible' : ''}" id="preview-${i}" src="${previewSrc}">
              <label class="image-upload-btn">
                📷 画像を選択（クリック）
                <input class="image-file-input" type="file" accept="image/*" onchange="onImageSelect(${i},this)">
              </label>
            </div>
          </div>`;
      }
      return '';
    }).join('');
  }

  window.addBlock = function(type) {
    blocks.push(type === 'text' ? { type: 'text', content: '' } : { type: 'image', url: '', _file: null, _preview: '' });
    renderBlocks();
    // 追加したブロックへスクロール
    setTimeout(() => {
      const last = document.querySelector('.block-item:last-child');
      if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  };

  window.removeBlock = function(i) {
    blocks.splice(i, 1);
    renderBlocks();
  };

  window.moveBlock = function(i, dir) {
    const j = i + dir;
    [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
    renderBlocks();
  };

  window.updateBlockText = function(i, val) {
    blocks[i].content = val;
  };

  window.onImageSelect = function(i, input) {
    const file = input.files[0];
    if (!file) return;
    blocks[i]._file = file;
    const reader = new FileReader();
    reader.onload = e => {
      blocks[i]._preview = e.target.result;
      const img = document.getElementById(`preview-${i}`);
      if (img) { img.src = e.target.result; img.classList.add('visible'); }
    };
    reader.readAsDataURL(file);
  };

  // ── 保存 ──────────────────────────────────
  window.saveArticle = async function() {
    const title = document.getElementById('titleInput').value.trim();
    const series = document.getElementById('seriesInput').value;
    if (!title) { showToast('タイトルを入力してください', 'error'); return; }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '保存中...';

    try {
      // 画像アップロード
      const id = currentId || doc(collection(db, 'faq')).id;
      for (let b of blocks) {
        if (b.type === 'image' && b._file) {
          const storageRef = ref(storage, `faq-images/${id}/${Date.now()}_${b._file.name}`);
          const snap = await uploadBytes(storageRef, b._file);
          b.url = await getDownloadURL(snap.ref);
          delete b._file;
          delete b._preview;
        }
      }

      // Firestore に保存（_file, _preview を除去）
      const cleanBlocks = blocks.map(({ _file, _preview, ...rest }) => rest);
      const data = {
        title,
        series,
        tags: [...tags],
        blocks: cleanBlocks,
        updatedAt: serverTimestamp(),
        ...(!currentId ? { createdAt: serverTimestamp() } : {}),
      };

      await setDoc(doc(db, 'faq', id), data, { merge: true });
      currentId = id;

      showToast('保存しました', 'success');
      await loadFAQs();
    } catch (e) {
      console.error(e);
      showToast('保存に失敗しました', 'error');
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存する'; }
    }
  };

  // ── 削除 ──────────────────────────────────
  window.deleteArticle = async function() {
    if (!currentId) return;
    if (!confirm('この記事を削除しますか？')) return;
    try {
      await deleteDoc(doc(db, 'faq', currentId));
      currentId = null;
      blocks = [];
      tags = [];
      document.getElementById('editor').innerHTML = `<div class="editor-placeholder"><div><div style="font-size:40px;margin-bottom:12px;">📝</div><div>記事を選択または新規作成してください</div></div></div>`;
      showToast('削除しました');
      await loadFAQs();
    } catch(e) {
      showToast('削除に失敗しました', 'error');
    }
  };

  // ── Toast ──────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  loadFAQs();
</script>
</body>
</html>
