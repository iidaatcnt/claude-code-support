<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code インストール 事前準備</title>
  <style>
    :root {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #f8f8f5;
      --primary: #f5a623;
      --primary-dark: #e8941a;
      --success: #27ae60;
      --warning: #e74c3c;
      --text: #1a1a1a;
      --subtext: #888888;
      --border: #e8e8e4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--primary);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
    }

    .header-logo span { color: var(--primary); }

    .header-nav { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .header-nav a { color: var(--subtext); text-decoration: none; font-size: 13px; font-weight: 600; transition: color 0.2s; }
    .header-nav a:hover { color: var(--primary-dark); }
    .header-nav a.active { color: var(--primary-dark); border-bottom: 2px solid var(--primary); padding-bottom: 1px; }

    /* Auth */
    .login-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .login-btn:hover { background: var(--primary-dark); }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }
    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      color: var(--subtext);
      font-family: inherit;
    }
    .logout-btn:hover { border-color: var(--warning); color: var(--warning); }

    .sync-badge {
      font-size: 11px;
      color: var(--success);
      font-weight: 600;
    }

    /* OS Selection */
    .os-selection {
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .os-selection h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .os-selection p {
      color: var(--subtext);
      font-size: 14px;
      margin-bottom: 36px;
    }

    .os-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .os-btn {
      flex: 1;
      max-width: 260px;
      padding: 36px 20px;
      background: var(--surface);
      border: 3px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .os-btn:hover {
      border-color: var(--primary);
      background: #fff3d6;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(245,166,35,0.2);
    }

    .os-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 12px;
    }

    .os-btn-sub {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--subtext);
      margin-top: 6px;
    }

    .os-or {
      font-size: 14px;
      font-weight: 700;
      color: var(--subtext);
      display: flex;
      align-items: center;
      padding: 0 4px;
    }

    /* Checklist Container */
    .checklist-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
      display: none;
    }

    .checklist-container.visible {
      display: block;
    }

    /* OS Tag */
    .os-toggle {
      display: flex;
      margin-bottom: 16px;
    }

    .os-toggle-btn {
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--subtext);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .os-toggle-btn:first-child { border-radius: 8px 0 0 8px; }
    .os-toggle-btn:last-child { border-radius: 0 8px 8px 0; border-left: none; }

    .os-toggle-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Progress circle */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-circle-wrap {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .progress-circle-wrap svg {
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 10;
    }

    .progress-ring-fill {
      fill: none;
      stroke: var(--primary);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }

    .progress-ring-fill.complete {
      stroke: #27ae60;
    }

    .progress-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .progress-count {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }

    .progress-label {
      font-size: 11px;
      color: var(--subtext);
      font-weight: 600;
      margin-top: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: var(--primary);
      color: var(--primary-dark);
      background: #fff3d6;
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    /* Section Label */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 10px 4px;
    }

    /* Checklist Item */
    .checklist-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .checklist-item.checked {
      border-color: rgba(76, 175, 80, 0.5);
      opacity: 0.7;
    }

    .item-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .item-header:hover { background: rgba(255,255,255,0.02); }

    /* Checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 700;
    }

    .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    /* Badge */
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .badge-required {
      background: #fde8e8;
      color: var(--warning);
      border: 1px solid #f5c6c6;
    }

    .badge-optional {
      background: #e8f4fd;
      color: #2980b9;
      border: 1px solid #c5e0f5;
    }

    .badge-important {
      background: #fde8e8;
      color: var(--warning);
      border: 1px solid #f5c6c6;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
    }

    .checkbox.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Item Title */
    .item-title {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
    }

    .item-title.done {
      text-decoration: line-through;
      color: var(--subtext);
    }

    /* Expand Arrow */
    .expand-arrow {
      color: var(--subtext);
      font-size: 11px;
      transition: transform 0.2s;
    }

    .expand-arrow.open { transform: rotate(180deg); }

    /* Item Content */
    .item-content {
      display: none;
      padding: 12px 16px 16px 50px;
      border-top: 1px solid var(--border);
    }

    .item-content.open { display: block; }

    .item-description {
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .content-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .content-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .content-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      background: #fff3d6;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .content-link:hover { background: #ffe9b0; }

    /* Select */
    .select-wrap { margin-top: 4px; }

    .select-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      appearance: none;
      font-family: inherit;
    }

    .select-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Completion Banner */
    .completion-banner {
      display: none;
      background: linear-gradient(135deg, rgba(39,174,96,0.1), rgba(245,166,35,0.1));
      border: 1px solid var(--success);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      margin-top: 24px;
    }

    .completion-banner.visible { display: block; }

    .completion-banner h3 { font-size: 20px; margin-bottom: 8px; }

    .completion-banner p {
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.6;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .modal h3 { font-size: 18px; margin-bottom: 10px; }

    .modal p {
      color: var(--subtext);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-buttons { display: flex; gap: 12px; }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    /* Libe name input */
    .libe-name-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      margin-bottom: 16px;
    }
    .libe-name-input:focus { border-color: var(--primary); }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-save:hover { background: var(--primary-dark); }

    .user-name-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      text-decoration: underline dotted var(--subtext);
    }
    .user-name-btn:hover { color: var(--primary-dark); }

    .btn-reset {
      flex: 1;
      padding: 12px;
      background: var(--warning);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <a href="/" class="header-logo">Claude <span>Code</span> インストール伴走会</a>
  <nav class="header-nav">
    <a href="/">トップ</a>
    <a href="/faq">FAQ</a>
    <a href="/precheck" class="active">事前準備</a>
    <span class="sync-badge" id="syncBadge" style="display:none">☁ 同期済み</span>
    <div id="authArea">
      <button class="login-btn" id="loginBtn">Googleでログイン</button>
    </div>
  </nav>
</div>

<!-- OS Selection -->
<div class="os-selection" id="osSelection">
  <h2>あなたのPCはどちらですか？</h2>
  <p>OSによって事前準備の内容が一部異なります</p>
  <div class="os-buttons">
    <button class="os-btn" onclick="selectOS('mac')">
      <span class="os-icon"></span>Mac
      <span class="os-btn-sub">Apple シリコン / Intel</span>
    </button>
    <span class="os-or">or</span>
    <button class="os-btn" onclick="selectOS('win')">
      <span class="os-icon">🪟</span>Windows
      <span class="os-btn-sub">x64 / ARM</span>
    </button>
  </div>
</div>

<!-- Checklist -->
<div class="checklist-container" id="checklistContainer">

  <div class="os-toggle">
    <button class="os-toggle-btn" id="toggleMac" onclick="switchOS('mac')">Mac</button>
    <button class="os-toggle-btn" id="toggleWin" onclick="switchOS('win')">Win</button>
  </div>

  <div class="progress-section">
    <div class="progress-circle-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="progress-ring-bg" cx="60" cy="60" r="50"/>
        <circle class="progress-ring-fill" id="progressRing" cx="60" cy="60" r="50" stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
      </svg>
      <div class="progress-center">
        <span class="progress-count" id="progressCount">0/0</span>
        <span class="progress-label">事前準備</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">未完了のみ表示</button>
    <button class="reset-btn" onclick="showResetModal()">最初からやり直す</button>
  </div>

  <div class="section-label">共通（全員）</div>
  <div id="commonItems"></div>

  <div class="section-label" id="osLabel"></div>
  <div id="osItems"></div>

  <div class="section-label">Git</div>
  <div id="gitItems"></div>

  <div class="completion-banner" id="completionBanner">
    <h3>🎉 準備完了！</h3>
    <p>全ての事前確認が完了しました。<br>当日は会場でお会いしましょう！</p>
  </div>

</div>

<!-- Libe Name Modal -->
<div class="modal-overlay" id="libeNameModal">
  <div class="modal">
    <h3>リベネームを入力</h3>
    <p>リベシティでのニックネームを入力してください。<br>後から変更できます。</p>
    <input class="libe-name-input" id="libeNameInput" type="text" placeholder="例：たろうさん" maxlength="20">
    <div class="modal-buttons">
      <button class="btn-cancel" id="libeNameSkip">スキップ</button>
      <button class="btn-save" id="libeNameSave">保存する</button>
    </div>
  </div>
</div>

<!-- Reset Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>最初からやり直しますか？</h3>
    <p>OS選択とチェックリストの進捗が全てリセットされます。<br>アカウント情報は削除されません。</p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="hideResetModal()">キャンセル</button>
      <button class="btn-reset" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDBG1tAKgcjBbht5YYxWdQssiWMlB7yRIc",
    authDomain: "claude-code-support.firebaseapp.com",
    projectId: "claude-code-support",
    storageBucket: "claude-code-support.firebasestorage.app",
    messagingSenderId: "819245008964",
    appId: "1:819245008964:web:ead21e5842189d1506d411"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;
  let libeName = '';

  // ── Auth UI ────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', () => {
    signInWithPopup(auth, new GoogleAuthProvider());
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    const authArea = document.getElementById('authArea');
    const syncBadge = document.getElementById('syncBadge');

    if (user) {
      // Firestoreからデータ読み込み
      const userData = await loadFromFirestore();

      // リベネーム未設定なら入力モーダルを表示
      if (!userData?.libeName) {
        showLibeNameModal();
      }

      renderUserInfo();
      syncBadge.style.display = '';
    } else {
      authArea.innerHTML = `<button class="login-btn" id="loginBtn">Googleでログイン</button>`;
      document.getElementById('loginBtn').addEventListener('click', () => {
        signInWithPopup(auth, new GoogleAuthProvider());
      });
      syncBadge.style.display = 'none';
      libeName = '';
    }
  });

  function renderUserInfo() {
    const authArea = document.getElementById('authArea');
    const displayName = libeName || currentUser?.displayName || currentUser?.email || '';
    authArea.innerHTML = `
      <div class="user-info">
        ${currentUser?.photoURL ? `<img class="user-avatar" src="${currentUser.photoURL}">` : ''}
        <button class="user-name-btn" id="editLibeNameBtn">${displayName}</button>
        <button class="logout-btn" id="logoutBtn">ログアウト</button>
      </div>`;
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    document.getElementById('editLibeNameBtn').addEventListener('click', showLibeNameModal);
  }

  // ── Libe Name Modal ────────────────────────
  function showLibeNameModal() {
    document.getElementById('libeNameInput').value = libeName;
    document.getElementById('libeNameModal').classList.add('visible');
    setTimeout(() => document.getElementById('libeNameInput').focus(), 100);
  }

  document.getElementById('libeNameSave').addEventListener('click', async () => {
    const val = document.getElementById('libeNameInput').value.trim();
    if (!val) return;
    libeName = val;
    document.getElementById('libeNameModal').classList.remove('visible');
    renderUserInfo();
    await saveToFirestore();
  });

  document.getElementById('libeNameSkip').addEventListener('click', () => {
    document.getElementById('libeNameModal').classList.remove('visible');
  });

  document.getElementById('libeNameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('libeNameSave').click();
  });

  // ── Firestore ──────────────────────────────
  async function loadFromFirestore() {
    if (!currentUser) return null;
    try {
      const snap = await getDoc(doc(db, 'users', currentUser.uid));
      if (snap.exists()) {
        const data = snap.data();
        if (data.libeName) libeName = data.libeName;
        if (data.os) { currentOS = data.os; localStorage.setItem('os', data.os); }
        if (data.checked) { checked = data.checked; localStorage.setItem('checked', JSON.stringify(data.checked)); }
        if (currentOS) showChecklist();
        return data;
      }
      return null;
    } catch(e) { console.error('Firestore読み込みエラー', e); return null; }
  }

  async function saveToFirestore() {
    if (!currentUser) return;
    try {
      await setDoc(doc(db, 'users', currentUser.uid), {
        libeName,
        os: currentOS,
        checked,
        updatedAt: new Date().toISOString(),
      });
    } catch(e) { console.error('Firestore保存エラー', e); }
  }

  const commonItems = [
    {
      id: 'wifi',
      title: 'WiFiの接続状況',
      description: 'インストールやアップデートには安定したWiFiが必要です。\n接続しているWiFiの速度を選択してください。',
      links: [{ icon: '🔗', label: 'Google Speed Test を開く', url: 'https://www.google.com/search?q=google+speed+test' }],
      type: 'select',
      selectId: 'select_wifi',
      options: ['選択してください', '高速', '低速', '繋がらない']
    },
    {

      title: 'ショートメッセージ（SMS）の確認',
      description: 'Claude Code のログインにはSMS認証が必要です。\n事前に自分宛にSMSを送って受信できるか確認しておきましょう。',
      links: []
    },
    {
      id: 'credit_card',
      title: 'クレジットカードの用意',
      description: 'Claude Code は Pro プラン以上でないと使用できません。\n当日 Pro 登録ができるよう、クレジットカードを用意しておいてください。',
      links: []
    },
    {
      id: 'claude_account',
      title: 'Claudeのアカウント確認',
      description: 'Claude のアカウントをすでに持っていますか？',
      links: [],
      type: 'select',
      selectId: 'select_claude_account',
      options: ['選択してください', 'ない', 'ある', 'たくさんある']
    },
    {
      id: 'power',
      title: '電源ケーブルの用意',
      optional: true,
      description: 'OSのアップデート中はバッテリー切れを防ぐため電源ケーブルが必要です。\n当日は必ず持参してください。',
      links: []
    },
    {
      id: 'name_badge',
      title: '名札の用意',
      optional: true,
      description: '会場（新橋オフィス）では名札の着用が必要です。\n当日は名札を持参するか、会場で受け取ってください。',
      links: []
    },
    {
      id: 'claude_plan',
      title: 'Claudeの契約プラン確認',
      optional: true,
      description: '現在契約している Claude のプランを選択してください。\nプランによって当日の開始ステップが変わります。',
      links: [],
      type: 'select',
      selectId: 'select_claude_plan',
      options: ['選択してください', 'なし（契約していない）', 'フリープラン', 'Pro', 'Max x5', 'Max x20', 'それ以上']
    }
  ];

  const macItems = [
    {
      id: 'macos_update',
      title: 'macOSのバージョン確認・アップデート',
      important: true,
      description: '【ステップ①】現在のバージョンを確認する\n左上のアップルメニュー（）→「このMacについて」でバージョンを確認してください。\n\n最新版は「macOS Tahoe 26.4」です。それ以外の場合はアップデートが必要です。\n\n【ステップ②】アップデートが必要な場合\nシステム設定 → 一般 → ソフトウェアアップデート\nアップデートには30分〜1時間かかるため、当日ではなく事前に済ませてください。',
      links: [],
      type: 'select',
      selectId: 'select_macos_version',
      options: ['選択してください', 'Tahoe 26.x（最新・OK）', 'それ以外（アップデートが必要）']
    },
    {
      id: 'mac_screenshot',
      title: 'スクショの撮り方（Mac）',
      optional: true,
      description: 'ほしい画面だけ切り取る方法と、保存場所を確認しておきましょう。\n\n全画面：⌘ + Shift + 3\n範囲選択：⌘ + Shift + 4\n保存先：デスクトップ',
      links: []
    }
  ];

  const winItems = [
    {
      id: 'win_type',
      title: 'WindowsのCPU種類を確認（Intel / ARM）',
      description: 'Claude Code のインストーラーは CPU の種類によって異なります。\n必ず確認してから選択してください。\n\n確認方法：Windowsキー + R →「msinfo32」と入力してEnter\n「システムの種類」欄で確認できます。',
      links: [],
      type: 'select',
      selectId: 'select_win_type',
      options: ['選択してください', 'Intel (x64)', 'ARM (ARM64)', 'わからない']
    },
    {
      id: 'win_screenshot',
      title: 'スクショの撮り方（Windows）',
      optional: true,
      description: 'ほしい画面だけ切り取る方法と、保存場所を確認しておきましょう。\n\n全画面：Windows + PrtSc\n範囲選択：Windows + Shift + S\n保存先：ピクチャ → スクリーンショット',
      links: []
    }
  ];

  const gitMacItems = [
    {
      id: 'git_mac_check',
      title: 'Gitのインストール確認（Mac）',
      optional: true,
      description: '【ターミナルの起動方法】\nSpotlight（⌘ + スペース）を開いて「ターミナル」と入力 → Enterで起動\n\n【確認コマンド】\ngit --version\n\nバージョン番号（例：git version 2.39.0）が表示されればインストール済みです。\n「command not found」と表示された場合はインストールが必要です。',
      links: []
    },
    {
      id: 'git_mac_install',
      title: 'Gitのインストール（Mac）',
      optional: true,
      description: 'Gitがインストールされていない場合は以下の手順でインストールしてください。\n\n【Xcode コマンドラインツール（推奨・無料）】\nターミナルで以下を実行：\nxcode-select --install\n\n画面にインストールの確認ダイアログが表示されるので「インストール」をクリック。\n完了後、再度「git --version」で確認してください。',
      links: []
    }
  ];

  const gitWinItems = [
    {
      id: 'git_win_check',
      title: 'Gitのインストール確認（Windows）',
      optional: true,
      description: 'コマンドプロンプト（またはPowerShell）を開いて以下を入力してください：\n\ngit --version\n\nバージョン番号（例：git version 2.44.0）が表示されればインストール済みです。\n「\u0027git\u0027 は...認識されません」と表示された場合はインストールが必要です。',
      links: []
    },
    {
      id: 'git_win_install',
      title: 'Gitのインストール（Windows）',
      optional: true,
      description: 'Gitがインストールされていない場合は以下の手順でインストールしてください。\n\n① 下記リンクから「Git for Windows」をダウンロード\n② インストーラーを実行（設定はすべてデフォルトのままでOK）\n③ インストール完了後、コマンドプロンプトを再起動して「git --version」で確認',
      links: [{ icon: '🔗', label: 'Git for Windows をダウンロード', url: 'https://git-scm.com/downloads/win' }]
    }
  ];

  // State
  let currentOS = localStorage.getItem('os') || null;
  let checked = JSON.parse(localStorage.getItem('checked') || '{}');
  let filterIncomplete = false;

  function init() {
    if (currentOS) {
      showChecklist();
    }
  }

  function selectOS(os) {
    currentOS = os;
    localStorage.setItem('os', os);
    showChecklist();
  }

  function switchOS(os) {
    currentOS = os;
    localStorage.setItem('os', os);
    showChecklist();
    saveToFirestore();
  }

  function showOSSelection() {
    document.getElementById('osSelection').style.display = 'block';
    document.getElementById('checklistContainer').classList.remove('visible');
  }

  function showChecklist() {
    document.getElementById('osSelection').style.display = 'none';
    document.getElementById('checklistContainer').classList.add('visible');
    document.getElementById('toggleMac').classList.toggle('active', currentOS === 'mac');
    document.getElementById('toggleWin').classList.toggle('active', currentOS === 'win');
    document.getElementById('osLabel').textContent = currentOS === 'mac' ? 'Mac 専用' : 'Windows 専用';
    renderAll();
    updateProgress();
  }

  function renderAll() {
    renderSection('commonItems', commonItems);
    renderSection('osItems', currentOS === 'mac' ? macItems : winItems);
    renderSection('gitItems', currentOS === 'mac' ? gitMacItems : gitWinItems);
  }

  function renderSection(containerId, items) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    items.forEach(item => {
      if (filterIncomplete && checked[item.id]) return;
      el.appendChild(buildItem(item));
    });
  }

  function buildItem(item) {
    const isChecked = !!checked[item.id];
    const isLocked = item.type === 'select' && !isChecked;
    const div = document.createElement('div');
    div.className = 'checklist-item' + (isChecked ? ' checked' : '');
    div.id = 'item-' + item.id;

    const hasContent = item.description || (item.links && item.links.length) || item.type === 'select';

    let contentHTML = '';
    if (hasContent) {
      let inner = '';
      if (item.description) {
        inner += `<p class="item-description">${item.description.replace(/\n/g, '<br>')}</p>`;
      }
      if (item.type === 'select') {
        const savedVal = checked[item.id + '_val'] || '';
        inner += `<div class="select-wrap">
          <select class="select-input" onchange="onSelect('${item.id}', this.value)">
            ${item.options.map(o => `<option value="${o}"${savedVal === o ? ' selected' : ''}>${o}</option>`).join('')}
          </select>
        </div>`;
      }
      if (item.links && item.links.length) {
        inner += `<div class="content-label">参考コンテンツ</div><div class="content-links">`;
        item.links.forEach(l => {
          inner += `<a class="content-link" href="${l.url}" target="_blank"><span>${l.icon}</span>${l.label}</a>`;
        });
        inner += `</div>`;
      }
      contentHTML = `<div class="item-content" id="content-${item.id}">${inner}</div>`;
    }

    const badge = item.optional
      ? `<span class="badge badge-optional">任意</span>`
      : `<span class="badge badge-required">必須</span>`;
    const importantBadge = item.important
      ? `<span class="badge badge-important">重要</span>`
      : '';

    div.innerHTML = `
      <div class="item-header" onclick="toggleExpand('${item.id}')">
        <div class="checkbox${isChecked ? ' checked' : ''}${isLocked ? ' locked' : ''}" onclick="toggleCheck(event,'${item.id}')">${isChecked ? '✓' : ''}</div>
        ${badge}${importantBadge}
        <span class="item-title${isChecked ? ' done' : ''}">${item.title}</span>
        ${hasContent ? `<span class="expand-arrow" id="arrow-${item.id}">▼</span>` : ''}
      </div>
      ${contentHTML}
    `;
    return div;
  }

  function toggleExpand(id) {
    const content = document.getElementById('content-' + id);
    const arrow = document.getElementById('arrow-' + id);
    if (content) content.classList.toggle('open');
    if (arrow) arrow.classList.toggle('open');
  }

  function toggleCheck(e, id) {
    e.stopPropagation();
    const allItems = [...commonItems, ...macItems, ...winItems, ...gitMacItems, ...gitWinItems];
    const item = allItems.find(i => i.id === id);

    // select型は選択によってのみチェック可能
    if (item?.type === 'select') {
      if (!checked[id]) {
        // 展開してselectをフラッシュ
        const content = document.getElementById('content-' + id);
        const arrow = document.getElementById('arrow-' + id);
        if (content && !content.classList.contains('open')) {
          content.classList.add('open');
          if (arrow) arrow.classList.add('open');
        }
        const select = content?.querySelector('.select-input');
        if (select) {
          select.style.borderColor = 'var(--warning)';
          select.focus();
          setTimeout(() => { select.style.borderColor = ''; }, 1500);
        }
      }
      return;
    }

    if (checked[id]) {
      delete checked[id];
    } else {
      checked[id] = true;
    }
    save();
    renderAll();
    updateProgress();
  }

  function onSelect(id, value) {
    if (value !== '選択してください') {
      checked[id] = true;
      checked[id + '_val'] = value;
    } else {
      delete checked[id];
      delete checked[id + '_val'];
    }
    save();
    updateProgress();
    // チェックボックスとタイトルだけ更新（ドロップダウンを閉じないため）
    const itemEl = document.getElementById('item-' + id);
    if (itemEl) {
      const isNowChecked = !!checked[id];
      itemEl.className = 'checklist-item' + (isNowChecked ? ' checked' : '');
      const cb = itemEl.querySelector('.checkbox');
      if (cb) { cb.className = 'checkbox' + (isNowChecked ? ' checked' : ''); cb.textContent = isNowChecked ? '✓' : ''; }
      const t = itemEl.querySelector('.item-title');
      if (t) t.className = 'item-title' + (isNowChecked ? ' done' : '');
    }
  }

  function updateProgress() {
    const osSpecific = currentOS === 'mac' ? macItems : winItems;
    const gitSpecific = currentOS === 'mac' ? gitMacItems : gitWinItems;
    const all = [...commonItems, ...osSpecific, ...gitSpecific];
    const required = all.filter(i => !i.optional);
    const total = all.length;
    const done = all.filter(i => checked[i.id]).length;
    const requiredDone = required.filter(i => checked[i.id]).length;

    // 円グラフ更新
    const circumference = 314.16; // 2 * π * 50
    const pct = total ? done / total : 0;
    const offset = circumference * (1 - pct);
    const ring = document.getElementById('progressRing');
    ring.style.strokeDashoffset = offset;
    ring.classList.toggle('complete', done === total && total > 0);
    document.getElementById('progressCount').textContent = done + '/' + total;

    // 必須項目がすべて完了で完了バナー表示
    document.getElementById('completionBanner').classList.toggle('visible', required.length > 0 && requiredDone === required.length);
  }

  function toggleFilter() {
    filterIncomplete = !filterIncomplete;
    const btn = document.getElementById('filterBtn');
    btn.classList.toggle('active', filterIncomplete);
    btn.textContent = filterIncomplete ? '全て表示' : '未完了のみ表示';
    renderAll();
  }

  function save() {
    localStorage.setItem('checked', JSON.stringify(checked));
    saveToFirestore();
  }

  function showResetModal() {
    document.getElementById('resetModal').classList.add('visible');
  }

  function hideResetModal() {
    document.getElementById('resetModal').classList.remove('visible');
  }

  function resetAll() {
    checked = {};
    currentOS = null;
    localStorage.removeItem('checked');
    localStorage.removeItem('os');
    saveToFirestore();
    hideResetModal();
    document.getElementById('checklistContainer').classList.remove('visible');
    document.getElementById('osSelection').style.display = 'block';
  }

  // モジュール内からHTMLのonclick属性で呼べるようwindowに公開
  window.selectOS = selectOS;
  window.switchOS = switchOS;
  window.showOSSelection = showOSSelection;
  window.toggleExpand = toggleExpand;
  window.toggleCheck = toggleCheck;
  window.onSelect = onSelect;
  window.toggleFilter = toggleFilter;
  window.showResetModal = showResetModal;
  window.hideResetModal = hideResetModal;
  window.resetAll = resetAll;

  init();
</script>
</body>
