// ===== UI初期化 =====
const totalCount = FAQ_DATA.length;
document.getElementById('totalCount').textContent = totalCount;

const previewList = document.getElementById('previewList');
const seriesColors = ['s0','s1','s2','s3'];
const seriesMap = {
  'クロコのよくある質問': 's0',
  'クロコのインストールはまりどころ': 's1',
  'クロコのオフ会の参加コツ': 's2',
  'Claude codeのよくある質問': 's3',
};

FAQ_DATA.forEach(f => {
  const div = document.createElement('div');
  div.className = 'faq-row';
  const cls = seriesMap[f.series] || 's3';
  div.innerHTML = `<span class="faq-series ${cls}">${f.series}</span><span class="faq-title">${f.title}</span>`;
  previewList.appendChild(div);
});

// ===== Auth =====
onAuthStateChanged(auth, (user) => {
  const authArea = document.getElementById('authArea');
  if (user) {
    authArea.innerHTML = `<div class="user-badge">✅ ログイン中：${user.displayName || user.email}</div>`;
    document.getElementById('importBtn').disabled = false;
  } else {
    authArea.innerHTML = `<button class="btn btn-google" id="loginBtn">🔑 Googleでログイン</button>`;
    document.getElementById('loginBtn').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
    document.getElementById('importBtn').disabled = true;
  }
});

// ===== インポート =====
const logEl = document.getElementById('log');
function addLog(msg, type='') {
  const line = document.createElement('div');
  line.className = 'log-line ' + (type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : '');
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById('importBtn').addEventListener('click', async () => {
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = '⏳ インポート中...';
  logEl.classList.add('show');
  addLog(`${FAQ_DATA.length} 件のインポートを開始します...`);

  let ok = 0, err = 0;
  for (const f of FAQ_DATA) {
    try {
      await addDoc(collection(db, 'faq'), {
        title: f.title,
        series: f.series,
        tags: f.tags || [],
        blocks: [{ type: 'text', content: f.body }],
        updatedAt: serverTimestamp()
      });
      addLog(`✓ ${f.title}`, 'ok');
      ok++;
    } catch(e) {
      addLog(`✗ ${f.title}：${e.message}`, 'err');
      err++;
    }
    await new Promise(r => setTimeout(r, 150));
  }

  addLog(`\n完了：成功 ${ok} 件 / 失敗 ${err} 件`);
  document.getElementById('doneBanner').style.display = 'block';
  document.getElementById('doneMsg').textContent = `${ok}件のFAQをFirestoreに登録しました。`;
  btn.textContent = '✅ インポート完了';
});
</script>
